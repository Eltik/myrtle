<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — mono + kicker</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background: var(--card); font-family: "Inter",system-ui; color: var(--foreground); display:grid; grid-template-columns: 1fr 1fr; gap: 22px; }
  .block { display:flex; flex-direction:column; gap: 10px; }
  .label { font: 500 11px/1 "Geist Mono", monospace; color: var(--muted-foreground); text-transform: uppercase; letter-spacing: 0.06em; }
  code {
    font: 400 13px/1.5 "Geist Mono", monospace;
    border: 1px solid var(--border);
    background: var(--muted);
    border-radius: 7px;
    padding: 2px 7px;
  }
  pre {
    margin: 0;
    font: 400 12.5px/1.55 "Geist Mono", monospace;
    background: var(--muted);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 12px 14px;
    color: var(--foreground);
  }
  .kicker { font: 700 0.69rem/1 "Inter"; letter-spacing: 0.16em; text-transform: uppercase; color: var(--primary); }
  .kicker-row { display:flex; gap: 14px; }
</style>
</head>
<body>
  <div class="block">
    <span class="label">mono · Geist Mono</span>
    <div>Inline <code>UID:U1234</code> token in prose.</div>
    <pre>const dps = calc(op, {
  trust: 200,
  potential: 6,
});</pre>
  </div>
  <div class="block">
    <span class="label">kicker · .island-kicker</span>
    <div class="kicker-row">
      <span class="kicker">Operators</span>
      <span class="kicker">Tier Lists</span>
      <span class="kicker">About</span>
    </div>
    <div style="font-size: 11px; color: var(--muted-foreground); font-family: 'Geist Mono', monospace;">0.69rem / 700 / +0.16em / primary</div>
  </div>
</body>
</html>
