<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Card + island shell</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background: var(--bg-base); font-family:"Inter",system-ui; display:grid; grid-template-columns: 1fr 1fr; gap: 18px; }
  .card {
    background: var(--card); color: var(--card-foreground);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 16px 18px;
    box-shadow: 0 1px 2px rgba(0,0,0,0.04);
  }
  .island {
    background: var(--card); color: var(--card-foreground);
    border: 1px solid var(--border);
    border-radius: 18px;
    padding: 18px 20px;
    box-shadow: 0 22px 44px rgba(23,58,64,0.10), 0 6px 18px rgba(23,58,64,0.08);
    backdrop-filter: blur(4px);
  }
  .title { font: 600 16px/1.3 "Inter"; margin: 0 0 4px 0; }
  .desc { font: 400 13px/1.5 "Inter"; color: var(--muted-foreground); margin: 0; }
  .kicker { font: 700 0.69rem/1 "Inter"; letter-spacing: 0.16em; text-transform: uppercase; color: var(--primary); margin-bottom: 6px; display:block; }
</style>
</head>
<body>
  <div class="card">
    <p class="title">Operator: Myrtle</p>
    <p class="desc">4★ Vanguard · 60s cycle · DP generation specialist.</p>
  </div>
  <div class="island">
    <span class="kicker">About</span>
    <p class="title" style="font-family: 'Inter', system-ui, sans-serif; font-size: 22px; font-weight: 700; color: var(--sea-ink); letter-spacing: -0.02em;">A small starter with room to grow.</p>
    <p class="desc">Type-safe routing, server functions, modern SSR defaults.</p>
  </div>
</body>
</html>
