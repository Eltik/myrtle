<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Brand — logo + wordmark</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html, body { margin:0; background: oklch(0.13 0.005 285); color: oklch(0.97 0.005 285); }
  body {
    padding: 24px; display:grid; grid-template-columns: auto 1fr auto; gap: 22px; align-items: center;
    font-family: "Inter", ui-sans-serif, system-ui;
  }

  /* Mark */
  .mark {
    display:flex; align-items:center; gap: 12px;
    padding: 10px 14px 10px 10px;
    border: 1px solid oklch(0.28 0.005 285);
    background: oklch(0.17 0.005 285);
    border-radius: 14px;
    box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.04), 0 1px 2px oklch(0 0 0 / 0.4);
  }
  .bezel {
    height: 30px; width: 30px; border-radius: 9px;
    display:inline-flex; align-items:center; justify-content:center;
    background:
      radial-gradient(120% 120% at 20% 10%, #ffd4d0 0%, #ffc4bd 40%, #f08a84 100%);
    color: oklch(0.13 0.005 285);
    box-shadow:
      inset 0 1px 0 oklch(1 0 0 / 0.35),
      inset 0 -1px 0 oklch(0 0 0 / 0.18),
      0 0 0 1px oklch(0.55 0.18 25 / 0.6),
      0 6px 18px #ffc4bd59;
  }
  .bezel svg { width: 16px; height: 16px; }
  .wordmark {
    font: 600 17px/1 "Inter"; letter-spacing: -0.015em; color: oklch(0.97 0.005 285);
  }
  .dot { display:inline-block; width: 4px; height: 4px; border-radius: 999px; background: #ffc4bd; margin: 0 1px 2px; }

  /* Middle: icon lockup shown alone */
  .center { display:flex; align-items:center; justify-content:center; gap: 18px; }
  .mono-lockup {
    display:flex; align-items:center; gap: 10px;
    padding: 10px 16px;
    border: 1px dashed oklch(0.28 0.005 285);
    border-radius: 10px;
    color: oklch(0.65 0.01 285);
  }
  .mono-lockup .mini {
    height: 18px; width: 18px; border-radius: 5px;
    background: #ffc4bd;
    color: oklch(0.13 0.005 285);
    display:inline-flex; align-items:center; justify-content:center;
    box-shadow: 0 0 14px #ffc4bd80;
  }
  .mono-lockup .mini svg { width: 10px; height: 10px; }
  .mono-lockup .txt { font: 500 12px/1 "Geist Mono", ui-monospace, monospace; letter-spacing: 0.02em; }

  /* Right: kicker */
  .kicker-block { text-align: right; }
  .kicker {
    font: 700 10.5px/1 "Inter"; letter-spacing: 0.22em; text-transform: uppercase;
    color: #ffc4bd; display:block; margin-bottom: 6px;
  }
  .kicker::before { content: "— "; color: oklch(0.45 0.01 285); }
  .tag { font: 500 12px/1.4 "Geist Mono", monospace; color: oklch(0.65 0.01 285); }

  /* Subtle glow */
  body::before {
    content:""; position: fixed; inset: -40% -40% auto auto; width: 60%; height: 120%;
    background: radial-gradient(closest-side, #ffc4bd24, transparent 70%);
    pointer-events:none;
  }
</style>
</head>
<body>
  <div class="mark">
    <span class="bezel" aria-hidden="true">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M4 18c2.5 0 2.5-4 5-4s2.5 4 5 4 2.5-4 5-4"/>
        <path d="M4 12c2.5 0 2.5-4 5-4s2.5 4 5 4 2.5-4 5-4"/>
      </svg>
    </span>
    <span class="wordmark">myrtle<span class="dot"></span>moe</span>
  </div>

  <div class="center">
    <div class="mono-lockup">
      <span class="mini">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 18c2.5 0 2.5-4 5-4s2.5 4 5 4 2.5-4 5-4"/>
        </svg>
      </span>
      <span class="txt">v3 · the arknights companion</span>
    </div>
  </div>

  <div class="kicker-block">
    <span class="kicker">Brand</span>
    <span class="tag">mark · wordmark · mono</span>
  </div>
</body>
</html>
