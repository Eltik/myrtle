<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Input + field</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background: var(--card); font-family:"Inter",system-ui; display:grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .field { display:flex; flex-direction:column; gap: 6px; }
  .label { font: 500 12px/1 "Inter"; color: var(--foreground); }
  .input {
    height: 30px; padding: 0 11px;
    border: 1px solid var(--input); background: var(--card);
    border-radius: var(--radius); font: 400 13px/30px "Inter";
    color: var(--foreground); outline: none;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .input::placeholder { color: color-mix(in srgb, var(--muted-foreground) 72%, transparent); }
  .input.focused { border-color: var(--ring); box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 24%, transparent); }
  .input.error { border-color: color-mix(in srgb, var(--destructive) 36%, transparent); }
  .hint { font: 400 11px/1.3 "Geist Mono", monospace; color: var(--muted-foreground); }
  .err { font: 400 11px/1.3 "Inter"; color: var(--destructive); }
</style>
</head>
<body>
  <div class="field">
    <label class="label">Arknights UID</label>
    <input class="input" placeholder="U1234567" />
    <div class="hint">12-digit Yostar id</div>
  </div>
  <div class="field">
    <label class="label">Server</label>
    <input class="input focused" value="EN" />
    <div class="hint">focused · ring/24</div>
  </div>
  <div class="field">
    <label class="label">Password</label>
    <input class="input error" value="•••••" type="password" />
    <div class="err">Incorrect credentials.</div>
  </div>
  <div class="field">
    <label class="label">Disabled</label>
    <input class="input" value="read-only" disabled style="opacity: 0.64" />
    <div class="hint">opacity-64</div>
  </div>
</body>
</html>
