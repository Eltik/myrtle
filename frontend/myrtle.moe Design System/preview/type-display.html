<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — display</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--card); font-family:"Inter",system-ui; color: var(--foreground); }
  .stack { display:flex; flex-direction:column; gap: 8px; }
  .kicker { font: 700 0.69rem/1 "Inter"; letter-spacing: 0.16em; text-transform: uppercase; color: var(--primary); }
  .display { font: 700 44px/1.05 "Inter", system-ui, sans-serif; color: var(--sea-ink); letter-spacing: -0.025em; }
  .sub { font: 400 16px/1.55 "Inter"; color: var(--sea-ink-soft); max-width: 52ch; }
  .meta { font: 400 11px/1.3 "Geist Mono", monospace; color: var(--muted-foreground); margin-top: 6px; }
</style>
</head>
<body>
  <div class="stack">
    <span class="kicker">About</span>
    <div class="display">A small starter with room to grow.</div>
    <div class="sub">Inter, weight 700, tracking –2.5%, line-height 1.05. Used for marketing heroes and page-level H1s. No serif display face — the whole site is Inter + Geist Mono.</div>
    <div class="meta">.display-title · Inter 700 · 44/46 · sea-ink</div>
  </div>
</body>
</html>
