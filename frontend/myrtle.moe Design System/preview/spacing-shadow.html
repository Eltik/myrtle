<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Shadow system</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:26px; background: var(--bg-base); font-family: "Inter",system-ui; }
  .row { display:grid; grid-template-columns: repeat(3, 1fr); gap: 18px; }
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: calc(var(--radius) * 1.8);
    padding: 16px; height: 96px;
    display:flex; flex-direction:column; justify-content:space-between;
  }
  .name { font: 600 13px/1 "Inter"; }
  .meta { font: 400 11px/1.3 "Geist Mono", monospace; color: var(--muted-foreground); }
  .xs { box-shadow: 0 1px 2px rgba(0,0,0,0.05); }
  .island { box-shadow: 0 22px 44px rgba(23,58,64,0.10), 0 6px 18px rgba(23,58,64,0.08); }
  .feature { box-shadow: 0 18px 34px rgba(23,58,64,0.10), 0 4px 14px rgba(23,58,64,0.06); }
</style>
</head>
<body>
  <div class="row">
    <div class="card xs"><span class="name">shadow-xs/5</span><span class="meta">hairline · inputs/buttons</span></div>
    <div class="card island"><span class="name">island-shell</span><span class="meta">22 44 / 6 18 · big heroes</span></div>
    <div class="card feature"><span class="name">feature-card</span><span class="meta">18 34 / 4 14 · content cards</span></div>
  </div>
</body>
</html>
