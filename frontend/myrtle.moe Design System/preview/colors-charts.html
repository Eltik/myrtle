<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Colors — charts</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:24px; background: var(--card); font-family: "Inter",system-ui; }
  .row { display:grid; grid-template-columns: repeat(5, 1fr); gap: 10px; }
  .sw { border: 1px solid var(--border); border-radius: 12px; overflow:hidden; }
  .chip { height: 58px; }
  .meta { padding: 8px 10px; background: var(--card);}
  .n { font-size: 12px; font-weight: 600; }
  .h { font: 400 11px/1.2 "Geist Mono", monospace; color: var(--muted-foreground); margin-top: 2px; }
  .bars { display: flex; gap: 4px; align-items:flex-end; height: 48px; margin-top: 14px; }
  .bars > div { flex: 1; border-radius: 4px; }
</style>
</head>
<body>
  <div class="row">
    <div class="sw"><div class="chip" style="background:var(--chart-1)"></div><div class="meta"><div class="n">chart-1</div><div class="h">primary coral</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-2)"></div><div class="meta"><div class="n">chart-2</div><div class="h">teal</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-3)"></div><div class="meta"><div class="n">chart-3</div><div class="h">blue-slate</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-4)"></div><div class="meta"><div class="n">chart-4</div><div class="h">gold</div></div></div>
    <div class="sw"><div class="chip" style="background:var(--chart-5)"></div><div class="meta"><div class="n">chart-5</div><div class="h">amber</div></div></div>
  </div>
  <div class="bars">
    <div style="background:var(--chart-1); height: 80%"></div>
    <div style="background:var(--chart-2); height: 55%"></div>
    <div style="background:var(--chart-3); height: 70%"></div>
    <div style="background:var(--chart-4); height: 40%"></div>
    <div style="background:var(--chart-5); height: 60%"></div>
  </div>
</body>
</html>
