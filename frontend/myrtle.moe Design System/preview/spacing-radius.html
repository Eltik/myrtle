<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radius scale</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background: var(--card); font-family: "Inter",system-ui; }
  .row { display:grid; grid-template-columns: repeat(7, 1fr); gap: 12px; }
  .tile { border: 1px solid var(--border); background: var(--muted); height: 64px; display:flex; align-items:center; justify-content:center; color: var(--muted-foreground); font: 500 11px/1 "Geist Mono", monospace; }
  .cap { font-size: 11px; color: var(--muted-foreground); margin-top: 6px; text-align:center; font-family: "Geist Mono", monospace; }
  .col { display:flex; flex-direction:column; }
</style>
</head>
<body>
  <div class="row">
    <div class="col"><div class="tile" style="border-radius: calc(var(--radius) * 0.6)">sm</div><div class="cap">~6px</div></div>
    <div class="col"><div class="tile" style="border-radius: calc(var(--radius) * 0.8)">md</div><div class="cap">~8px</div></div>
    <div class="col"><div class="tile" style="border-radius: var(--radius)">lg</div><div class="cap">10px</div></div>
    <div class="col"><div class="tile" style="border-radius: calc(var(--radius) * 1.4)">xl</div><div class="cap">14px</div></div>
    <div class="col"><div class="tile" style="border-radius: calc(var(--radius) * 1.8)">2xl · card</div><div class="cap">18px</div></div>
    <div class="col"><div class="tile" style="border-radius: calc(var(--radius) * 2.2)">3xl</div><div class="cap">22px</div></div>
    <div class="col"><div class="tile" style="border-radius: 999px">pill</div><div class="cap">999</div></div>
  </div>
</body>
</html>
