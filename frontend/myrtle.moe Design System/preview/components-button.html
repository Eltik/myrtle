<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Button variants</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  body { margin:0; padding:22px; background: var(--card); font-family: "Inter",system-ui; display:flex; flex-wrap: wrap; gap: 10px; align-items:center; }
  .btn {
    height: 32px; padding: 0 11px;
    display:inline-flex; align-items:center; gap: 8px;
    border: 1px solid; border-radius: var(--radius);
    font: 500 13px/1 "Inter";
    cursor: pointer; transition: background-color 180ms ease, border-color 180ms ease;
    box-shadow: 0 1px 2px rgba(0,0,0,0.05);
  }
  .btn.default { background: var(--primary); color: var(--primary-foreground); border-color: var(--primary); }
  .btn.default:hover { background: color-mix(in srgb, var(--primary) 90%, black); }
  .btn.secondary { background: var(--secondary); color: var(--secondary-foreground); border-color: transparent; }
  .btn.outline { background: var(--card); color: var(--foreground); border-color: var(--input); }
  .btn.ghost { background: transparent; color: var(--foreground); border-color: transparent; box-shadow:none; }
  .btn.ghost:hover { background: var(--accent); }
  .btn.destructive { background: var(--destructive); color: white; border-color: var(--destructive); }
  .btn.lg { height: 36px; padding: 0 14px; font-size: 14px; }
  .btn.sm { height: 28px; padding: 0 10px; font-size: 12px; }
</style>
</head>
<body>
  <button class="btn default">Primary</button>
  <button class="btn secondary">Secondary</button>
  <button class="btn outline">Outline</button>
  <button class="btn ghost">Ghost</button>
  <button class="btn destructive">Destructive</button>
  <button class="btn default lg">Large</button>
  <button class="btn default sm">Small</button>
</body>
</html>
