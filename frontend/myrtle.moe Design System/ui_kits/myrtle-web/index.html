<!DOCTYPE html>
<html lang="en" class="dark">
<head>
<meta charset="utf-8">
<title>myrtle.moe · v3 homepage</title>
<link rel="stylesheet" href="../../colors_and_type.css">
<style>
  /* ────────────────────────────────────────────────────────────
     myrtle.moe v3 — recreated UI. Dark by default.
     Built on top of tokens in colors_and_type.css.
     Class names mirror shadcn / COSS-UI conventions:
       .coss-btn / .coss-kbd / .coss-badge / .coss-sep / .coss-card
     Layout classes live here:
       .hero, .hero-inner, .hero-grid, .hero-glow,
       .cmd-popup (command palette), .cmd-backdrop (modal),
       .op-grid / .op-card / .op-frame (roster),
       .features / .feat-card,
       .drawer-*, .site-header, .site-footer.
     ──────────────────────────────────────────────────────────── */

  html, body { margin: 0; padding: 0; }
  body {
    background: var(--background);
    color: var(--foreground);
    font-family: var(--font-sans);
    min-height: 100vh;
    text-rendering: optimizeLegibility;
    -webkit-font-smoothing: antialiased;
    overflow-x: hidden;
  }
  *, *::before, *::after { box-sizing: border-box; }
  a { color: inherit; text-decoration: none; }

  .app { display: flex; flex-direction: column; min-height: 100vh; position: relative; }
  main { position: relative; z-index: 1; }
  .page-wrap { width: min(1180px, calc(100% - 2rem)); margin-inline: auto; }

  /* ── Global hero glow (behind everything) ─────────────────── */
  body::before {
    content: "";
    position: fixed; inset: -10% -20% auto auto;
    width: 70%; height: 80%; pointer-events: none; z-index: 0;
    background:
      radial-gradient(closest-side, oklch(0.75 0.15 25 / 0.10), transparent 72%),
      radial-gradient(closest-side at 20% 40%, oklch(0.4 0.05 25 / 0.08), transparent 70%);
    filter: blur(12px);
  }

  /* ─────────────────────────────────────────────────────────── */
  /* Header                                                      */
  /* ─────────────────────────────────────────────────────────── */
  .site-header {
    position: sticky; top: 0; z-index: 40;
    backdrop-filter: blur(14px) saturate(1.5);
    -webkit-backdrop-filter: blur(14px) saturate(1.5);
    background: linear-gradient(180deg,
      oklch(0.15 0.005 285 / 0.8) 0%,
      oklch(0.13 0.005 285 / 0.6) 100%);
    border-bottom: 1px solid oklch(1 0 0 / 0.05);
  }
  .site-header::before {
    content: ""; position: absolute; left: 0; right: 0; top: 0; height: 1px;
    background: linear-gradient(90deg, transparent, oklch(1 0 0 / 0.05), transparent);
  }
  .header-inner {
    width: min(1180px, calc(100% - 2rem)); margin-inline: auto;
    display: flex; align-items: center; height: 60px; gap: 14px;
  }
  .brand { display: inline-flex; align-items: center; gap: 10px; cursor: pointer; }
  .brand-bezel {
    width: 28px; height: 28px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: radial-gradient(120% 120% at 20% 10%, #ffd4d0 0%, #ffc4bd 45%, #f08a84 100%);
    color: oklch(0.13 0.005 285);
    box-shadow:
      inset 0 1px 0 oklch(1 0 0 / 0.35),
      inset 0 -1px 0 oklch(0 0 0 / 0.2),
      0 0 0 1px oklch(0.55 0.18 25 / 0.5),
      0 0 18px oklch(0.75 0.15 25 / 0.3);
  }
  .brand-bezel svg { width: 14px; height: 14px; }
  .brand-bezel.small { width: 22px; height: 22px; border-radius: 6px; }
  .brand-bezel.small svg { width: 11px; height: 11px; }
  .brand-word { font: 600 15px/1 "Inter"; letter-spacing: -0.015em; color: var(--foreground); }
  .brand-tag {
    font: 500 10.5px/1 "Geist Mono", monospace;
    padding: 3px 6px; border-radius: 5px;
    background: oklch(0.22 0.005 285 / 0.7);
    color: var(--muted-foreground);
    border: 1px solid oklch(1 0 0 / 0.04);
  }

  .main-nav { display: flex; gap: 2px; margin-left: 18px; flex: 1; }
  .nav-item { position: relative; }
  .nav-link {
    position: relative; display: inline-flex; align-items: center; gap: 4px;
    padding: 7px 12px; border-radius: 8px;
    font: 500 13px/1 "Inter"; color: var(--muted-foreground);
    cursor: pointer; transition: color 160ms ease, background-color 160ms ease;
  }
  .nav-link:hover { color: var(--foreground); background: oklch(0.22 0.005 285 / 0.55); }
  .nav-link.is-active {
    color: var(--foreground);
    background: linear-gradient(180deg, oklch(0.24 0.025 25 / 0.5), oklch(0.2 0.02 25 / 0.35));
    box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.04);
  }
  .nav-link::after {
    content: ""; position: absolute; left: 12px; right: 12px; bottom: 3px;
    height: 2px; border-radius: 2px; background: var(--primary);
    box-shadow: 0 0 8px oklch(0.75 0.15 25 / 0.5);
    transform: scaleX(0); transform-origin: left;
    transition: transform 170ms ease;
  }
  .nav-link:hover::after, .nav-link.is-active::after { transform: scaleX(1); }
  .chev { width: 12px; height: 12px; opacity: 0.6; margin-left: 2px; transition: transform 180ms ease; }
  .chev.is-open { transform: rotate(180deg); opacity: 0.9; }

  /* Tools dropdown menu */
  .nav-menu {
    position: absolute; top: calc(100% + 10px); left: -8px;
    min-width: 380px;
    background: linear-gradient(180deg, oklch(0.19 0.008 285 / 0.98), oklch(0.15 0.006 285 / 0.98));
    backdrop-filter: blur(14px) saturate(1.4);
    -webkit-backdrop-filter: blur(14px) saturate(1.4);
    border: 1px solid oklch(1 0 0 / 0.08);
    border-radius: 14px;
    padding: 8px;
    box-shadow:
      inset 0 1px 0 oklch(1 0 0 / 0.06),
      0 20px 44px oklch(0 0 0 / 0.5),
      0 6px 14px oklch(0 0 0 / 0.3);
    z-index: 50;
    animation: nav-menu-in 160ms cubic-bezier(0.16, 1, 0.3, 1);
  }
  @keyframes nav-menu-in {
    from { opacity: 0; transform: translateY(-6px); }
    to { opacity: 1; transform: translateY(0); }
  }
  /* Invisible hover bridge so cursor can cross gap */
  .nav-menu::before {
    content: ""; position: absolute; left: 0; right: 0; top: -10px; height: 10px;
  }
  .nav-menu-label {
    font: 500 10.5px/1 "Geist Mono", monospace;
    color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 8px 12px 6px;
  }
  .nav-menu-list { display: flex; flex-direction: column; gap: 1px; }
  .nav-menu-item {
    display: flex; align-items: center; gap: 12px;
    padding: 10px 12px; border-radius: 9px;
    cursor: pointer; transition: background-color 140ms ease;
  }
  .nav-menu-item:hover {
    background: linear-gradient(180deg, oklch(0.24 0.025 25 / 0.4), oklch(0.2 0.02 25 / 0.28));
    box-shadow: inset 0 0 0 1px oklch(0.75 0.15 25 / 0.18);
  }
  .nav-menu-icon {
    width: 32px; height: 32px; border-radius: 8px;
    display: inline-flex; align-items: center; justify-content: center;
    background: oklch(0.22 0.005 285 / 0.7);
    border: 1px solid oklch(1 0 0 / 0.05);
    color: oklch(0.8 0.14 25); flex-shrink: 0;
  }
  .nav-menu-icon svg { width: 16px; height: 16px; }
  .nav-menu-item:hover .nav-menu-icon { background: oklch(0.3 0.08 25 / 0.4); border-color: oklch(0.75 0.15 25 / 0.3); }
  .nav-menu-text { flex: 1; display: flex; flex-direction: column; gap: 3px; min-width: 0; }
  .nav-menu-title { font: 500 13px/1 "Inter"; color: var(--foreground); letter-spacing: -0.005em; }
  .nav-menu-desc { font: 400 11.5px/1.3 "Inter"; color: var(--muted-foreground); }
  .nav-menu-kbd { display: inline-flex; gap: 2px; flex-shrink: 0; }
  .nav-menu-foot {
    display: flex; justify-content: space-between; align-items: center;
    gap: 8px; padding: 10px 12px 8px; margin-top: 6px;
    border-top: 1px solid oklch(1 0 0 / 0.06);
    font: 400 11.5px/1 "Inter"; color: var(--muted-foreground);
  }
  .nav-menu-foot .small-mono { display: inline-flex; align-items: center; gap: 5px; }

  .header-actions { display: flex; align-items: center; gap: 6px; }

  .header-search {
    display: inline-flex; align-items: center; gap: 8px;
    height: 32px; padding: 0 10px 0 12px !important;
    min-width: 240px;
    background: oklch(0.18 0.008 285 / 0.6) !important;
    border: 1px solid oklch(1 0 0 / 0.05) !important;
    color: var(--muted-foreground) !important;
    font: 400 13px/1 "Inter";
    justify-content: flex-start !important;
  }
  .header-search:hover { border-color: oklch(1 0 0 / 0.1) !important; color: var(--foreground) !important; }
  .header-search svg { width: 14px; height: 14px; opacity: 0.7; }
  .header-search .kbd-inline { margin-left: auto; display: inline-flex; gap: 2px; }

  /* ─────────────────────────────────────────────────────────── */
  /* COSS primitives                                             */
  /* ─────────────────────────────────────────────────────────── */
  .coss-btn {
    display: inline-flex; align-items: center; justify-content: center; gap: 8px;
    height: 34px; padding: 0 14px; border-radius: 9px;
    font: 500 13px/1 "Inter"; cursor: pointer;
    border: 1px solid transparent;
    transition: transform 120ms ease, background-color 160ms ease, border-color 160ms ease, box-shadow 160ms ease, color 160ms ease;
    white-space: nowrap;
    background: transparent; color: var(--foreground);
  }
  .coss-btn:active { transform: translateY(0.5px); }
  .coss-btn svg { width: 14px; height: 14px; opacity: 0.9; flex-shrink: 0; }

  .coss-btn.v-default {
    background: linear-gradient(180deg, oklch(0.78 0.14 25), oklch(0.72 0.15 25));
    color: oklch(0.13 0.005 285);
    border-color: oklch(0.6 0.18 25 / 0.6);
    box-shadow:
      inset 0 1px 0 oklch(1 0 0 / 0.3),
      inset 0 -1px 0 oklch(0 0 0 / 0.15),
      0 6px 14px oklch(0.75 0.15 25 / 0.28),
      0 0 0 0 oklch(0.75 0.15 25 / 0);
  }
  .coss-btn.v-default:hover {
    box-shadow:
      inset 0 1px 0 oklch(1 0 0 / 0.35),
      inset 0 -1px 0 oklch(0 0 0 / 0.15),
      0 8px 18px oklch(0.75 0.15 25 / 0.4),
      0 0 0 3px oklch(0.75 0.15 25 / 0.15);
  }
  .coss-btn.v-outline {
    background: oklch(0.17 0.005 285 / 0.6);
    color: var(--foreground);
    border-color: oklch(1 0 0 / 0.08);
  }
  .coss-btn.v-outline:hover { background: oklch(0.22 0.005 285 / 0.8); border-color: oklch(1 0 0 / 0.14); }
  .coss-btn.v-ghost { background: transparent; color: var(--foreground); }
  .coss-btn.v-ghost:hover { background: oklch(0.22 0.005 285 / 0.6); }

  .coss-btn.s-sm { height: 30px; padding: 0 11px; font-size: 12.5px; border-radius: 8px; }
  .coss-btn.s-lg { height: 42px; padding: 0 18px; font-size: 14px; border-radius: 10px; gap: 9px; }
  .coss-btn.s-lg svg { width: 15px; height: 15px; }
  .coss-btn.s-icon { width: 32px; height: 32px; padding: 0; }

  .coss-kbd {
    display: inline-flex; align-items: center; justify-content: center;
    min-width: 18px; height: 18px; padding: 0 5px;
    font: 500 10.5px/1 "Geist Mono", monospace;
    background: oklch(0.22 0.005 285);
    color: var(--foreground);
    border: 1px solid oklch(1 0 0 / 0.06);
    border-radius: 4px;
    box-shadow: inset 0 -1px 0 oklch(0 0 0 / 0.2);
  }

  .coss-sep { background: oklch(1 0 0 / 0.06); flex-shrink: 0; }
  .coss-sep.horizontal { height: 1px; width: 100%; }
  .coss-sep.vertical { width: 1px; align-self: stretch; }
  .coss-sep.h3 { height: 14px; }
  .coss-sep.h5 { height: 20px; }

  .coss-badge {
    display: inline-flex; align-items: center; padding: 0 8px; height: 20px;
    border-radius: 5px; font: 500 11px/1 "Inter"; border: 1px solid transparent;
  }
  .coss-badge.v-default { background: var(--primary); color: var(--primary-foreground); }
  .coss-badge.v-secondary { background: oklch(0.22 0.005 285); color: var(--foreground); }
  .coss-badge.v-outline { background: transparent; color: var(--foreground); border-color: oklch(1 0 0 / 0.1); }
  .coss-badge.v-success {
    background: oklch(0.65 0.14 155 / 0.15);
    color: oklch(0.78 0.14 155);
    border-color: oklch(0.65 0.14 155 / 0.3);
  }

  .coss-kicker {
    display: inline-block;
    font: 700 10.5px/1 "Inter";
    letter-spacing: 0.22em; text-transform: uppercase;
    color: var(--primary);
    margin-bottom: 10px;
  }

  /* ─────────────────────────────────────────────────────────── */
  /* Hero                                                        */
  /* ─────────────────────────────────────────────────────────── */
  .hero { position: relative; padding: 88px 0 72px; overflow: hidden; min-height: 660px; }

  /* Full-bleed Arknights story CG as hero backdrop.
   *  - image lives in a single <div className="hero-bg"> with img child
   *  - heavy dark vignette + left-side gradient keeps copy legible
   *  - scale/blur on the ::after keeps edges from feeling like a "photo"
   */
  .hero-bg {
    position: absolute; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .hero-bg-img {
    position: absolute; inset: 0;
    width: 100%; height: 100%;
    object-fit: cover;
    object-position: center 30%;
    opacity: 0.55;
    filter: saturate(0.85) contrast(1.05);
    transform: scale(1.02);
    transition: opacity 600ms ease, object-position 600ms ease;
  }
  /* Dark gradient overlay — strong on left (where copy lives), lighter on right */
  .hero-bg::before {
    content: ""; position: absolute; inset: 0; z-index: 1;
    background:
      linear-gradient(90deg,
        oklch(0.10 0.006 285 / 0.92) 0%,
        oklch(0.10 0.006 285 / 0.78) 28%,
        oklch(0.10 0.006 285 / 0.45) 58%,
        oklch(0.10 0.006 285 / 0.55) 100%);
  }
  /* Vertical vignette + primary-color wash so the CG reads as "ours" */
  .hero-bg::after {
    content: ""; position: absolute; inset: 0; z-index: 2;
    background:
      radial-gradient(ellipse 80% 100% at 50% 0%, transparent 0%, oklch(0.08 0.005 285 / 0.5) 100%),
      radial-gradient(ellipse 60% 80% at 15% 50%, oklch(0.75 0.15 25 / 0.08), transparent 70%);
  }
  .hero-glow {
    position: absolute; inset: 0; pointer-events: none; z-index: 3;
    background:
      radial-gradient(500px 240px at 15% 18%, oklch(0.75 0.15 25 / 0.12), transparent 70%);
  }
  .hero-grid {
    position: absolute; inset: 0; pointer-events: none; z-index: 3; opacity: 0.10;
    background-image:
      linear-gradient(oklch(1 0 0 / 0.05) 1px, transparent 1px),
      linear-gradient(90deg, oklch(1 0 0 / 0.05) 1px, transparent 1px);
    background-size: 44px 44px;
    mask-image: radial-gradient(ellipse 60% 50% at 30% 50%, black 0%, transparent 80%);
    -webkit-mask-image: radial-gradient(ellipse 60% 50% at 30% 50%, black 0%, transparent 80%);
  }
  /* CG credit slug — bottom-right corner */
  .hero-cg-credit {
    position: absolute;
    right: 20px; bottom: 16px; z-index: 4;
    display: flex; align-items: center; gap: 8px;
    font: 500 10px/1 "Geist Mono", monospace;
    color: oklch(0.7 0.02 285 / 0.7);
    letter-spacing: 0.12em; text-transform: uppercase;
    pointer-events: none;
  }
  .hero-cg-credit::before {
    content: ""; width: 28px; height: 1px;
    background: linear-gradient(90deg, transparent, oklch(0.75 0.15 25 / 0.5));
  }
  .hero-inner {
    position: relative; z-index: 1;
    width: min(1180px, calc(100% - 2rem)); margin-inline: auto;
    display: grid; grid-template-columns: minmax(0, 1fr) minmax(0, 1fr); gap: 48px;
    align-items: center;
  }
  @media (max-width: 900px) {
    .hero-inner { grid-template-columns: 1fr; gap: 40px; }
  }

  .hero-copy { display: flex; flex-direction: column; gap: 0; }
  .status-pill {
    display: inline-flex; align-items: center; gap: 8px;
    padding: 6px 12px 6px 10px; border-radius: 999px;
    background: oklch(0.18 0.008 285 / 0.6);
    border: 1px solid oklch(1 0 0 / 0.06);
    width: max-content;
    margin-bottom: 20px;
  }
  .dot-pulse {
    width: 7px; height: 7px; border-radius: 999px; background: oklch(0.75 0.17 155);
    box-shadow: 0 0 0 0 oklch(0.75 0.17 155 / 0.6);
    animation: dot-pulse 1.8s ease-out infinite;
  }
  @keyframes dot-pulse {
    0% { box-shadow: 0 0 0 0 oklch(0.75 0.17 155 / 0.6); }
    100% { box-shadow: 0 0 0 8px oklch(0.75 0.17 155 / 0); }
  }
  .small-mono { font: 500 11.5px/1 "Geist Mono", monospace; color: var(--muted-foreground); }
  .pill-link {
    font: 500 11.5px/1 "Inter"; color: var(--primary); cursor: pointer; transition: color 160ms ease;
  }
  .pill-link:hover { color: oklch(0.85 0.12 25); }

  .display {
    font: 700 64px/1.03 "Inter", system-ui, sans-serif;
    letter-spacing: -0.03em;
    color: var(--foreground);
    margin: 0 0 18px;
    max-width: 14ch;
  }
  .display .accent {
    color: var(--primary);
    text-shadow: 0 0 30px oklch(0.75 0.15 25 / 0.35);
  }
  @media (max-width: 900px) { .display { font-size: 48px; } }

  .lead {
    font: 400 17px/1.55 "Inter"; color: oklch(0.80 0.005 285);
    margin: 0 0 28px; max-width: 48ch;
    display: flex; flex-wrap: wrap; gap: 4px; align-items: center;
  }
  .lead .coss-kbd { margin: 0 2px; vertical-align: baseline; }

  .hero-actions { display: flex; gap: 10px; margin-bottom: 32px; flex-wrap: wrap; }

  .hero-stats {
    display: flex; gap: 28px; padding-top: 20px;
    border-top: 1px solid oklch(1 0 0 / 0.06);
  }
  .hero-stats > div { display: flex; flex-direction: column; gap: 4px; }
  .hero-stats b {
    font: 700 24px/1 "Inter"; letter-spacing: -0.02em;
    color: var(--foreground);
  }
  .hero-stats span {
    font: 500 11px/1 "Geist Mono", monospace; color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.08em;
  }

  .hero-panel {
    cursor: pointer;
    perspective: 1400px;
    outline: none;
    position: relative;
    --tilt-x: 6deg;
    --tilt-y: -4deg;
    --tilt-z: 0px;
  }
  .hero-panel:focus-visible .cmd-popup { box-shadow: 0 0 0 3px oklch(0.75 0.15 25 / 0.4), 0 30px 60px oklch(0 0 0 / 0.5); }

  /* Hero responsive — single column below 900px */
  @media (max-width: 900px) {
    .hero { min-height: 540px; padding: 60px 0 48px; }
    .hero-bg-img { object-position: 70% 30%; opacity: 0.38; }
  }

  /* ─────────────────────────────────────────────────────────── */
  /* Command palette (preview + live dialog)                     */
  /* ─────────────────────────────────────────────────────────── */
  .cmd-popup {
    position: relative;
    z-index: 1;
    background: linear-gradient(180deg, oklch(0.19 0.008 285 / 0.98), oklch(0.15 0.006 285 / 0.98));
    border: 1px solid oklch(1 0 0 / 0.08);
    border-radius: 14px;
    overflow: hidden;
    box-shadow:
      inset 0 1px 0 oklch(1 0 0 / 0.06),
      0 30px 60px oklch(0 0 0 / 0.5),
      0 8px 18px oklch(0 0 0 / 0.3),
      0 0 0 1px oklch(0 0 0 / 0.1);
    font-family: "Inter", system-ui, sans-serif;
  }
  .cmd-popup:not(.live) {
    transform: rotateX(var(--tilt-x, 6deg)) rotateY(var(--tilt-y, -4deg)) translateZ(var(--tilt-z, 0px));
    transform-style: preserve-3d;
    transition: transform 420ms cubic-bezier(0.16, 1, 0.3, 1), box-shadow 240ms ease;
    will-change: transform;
  }
  .hero-panel.is-tilting .cmd-popup:not(.live) { transition: none; }
  .cmd-head {
    display: flex; align-items: center; gap: 10px;
    padding: 14px 16px;
    border-bottom: 1px solid oklch(1 0 0 / 0.06);
  }
  .cmd-search-icon { width: 16px; height: 16px; color: var(--muted-foreground); flex-shrink: 0; }
  .cmd-input {
    flex: 1; background: transparent; border: none; outline: none;
    font: 400 14px/1 "Inter"; color: var(--foreground);
    padding: 0;
  }
  .cmd-input::placeholder { color: var(--muted-foreground); }
  .cmd-panel { padding: 10px 8px; max-height: 340px; overflow: auto; }
  .cmd-group { padding: 6px 0; }
  .cmd-group-label {
    font: 500 10.5px/1 "Geist Mono", monospace;
    color: var(--muted-foreground);
    text-transform: uppercase; letter-spacing: 0.1em;
    padding: 6px 12px 8px;
  }
  .cmd-item {
    display: flex; align-items: center; gap: 12px;
    padding: 8px 10px; border-radius: 8px;
    font: 400 13px/1 "Inter"; color: var(--foreground);
    cursor: pointer;
  }
  .cmd-item:hover, .cmd-item.is-highlighted {
    background: linear-gradient(180deg, oklch(0.24 0.025 25 / 0.45), oklch(0.2 0.02 25 / 0.3));
    box-shadow: inset 0 0 0 1px oklch(0.75 0.15 25 / 0.18);
  }
  .cmd-item > svg { width: 15px; height: 15px; color: var(--muted-foreground); flex-shrink: 0; }
  .cmd-primary { flex: 1; font-weight: 500; }
  .cmd-meta { font: 400 12px/1 "Inter"; color: var(--muted-foreground); margin-right: 8px; }
  .cmd-sep { height: 1px; background: oklch(1 0 0 / 0.06); margin: 4px 10px; }
  .cmd-empty {
    padding: 34px 18px; text-align: center;
    font: 400 13px/1.4 "Inter"; color: var(--muted-foreground);
  }
  .cmd-footer {
    display: flex; gap: 14px; align-items: center;
    padding: 10px 14px;
    border-top: 1px solid oklch(1 0 0 / 0.06);
    background: oklch(0.13 0.005 285 / 0.4);
    font: 400 11.5px/1 "Inter"; color: var(--muted-foreground);
  }
  .cmd-footer span { display: inline-flex; align-items: center; gap: 5px; }
  .cmd-footer .right { margin-left: auto; font: 500 10.5px/1 "Geist Mono", monospace; letter-spacing: 0.04em; color: oklch(0.55 0.01 285); }

  /* Role-colored operator chips */
  .op-chip {
    display: inline-flex; align-items: center; justify-content: center;
    width: 24px; height: 24px; border-radius: 6px;
    font: 700 11px/1 "Inter"; color: white;
    letter-spacing: -0.01em;
    flex-shrink: 0;
    box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.2), inset 0 -1px 0 oklch(0 0 0 / 0.2);
  }
  .c-vanguard { background: linear-gradient(135deg, oklch(0.7 0.12 55), oklch(0.55 0.14 45)); }
  .c-caster   { background: linear-gradient(135deg, oklch(0.65 0.18 290), oklch(0.5 0.2 285)); }
  .c-medic    { background: linear-gradient(135deg, oklch(0.72 0.14 180), oklch(0.58 0.14 175)); }
  .c-defender { background: linear-gradient(135deg, oklch(0.7 0.1 85), oklch(0.58 0.12 75)); }
  .c-support  { background: linear-gradient(135deg, oklch(0.68 0.14 330), oklch(0.55 0.16 320)); }
  .c-sniper   { background: linear-gradient(135deg, oklch(0.72 0.14 155), oklch(0.55 0.14 150)); }
  .c-guard    { background: linear-gradient(135deg, oklch(0.65 0.2 20), oklch(0.52 0.2 15)); }
  .c-special  { background: linear-gradient(135deg, oklch(0.7 0.14 230), oklch(0.55 0.15 225)); }

  /* Live command dialog overlay */
  .cmd-backdrop {
    position: fixed; inset: 0; z-index: 100;
    background: oklch(0.08 0.005 285 / 0.7);
    backdrop-filter: blur(6px);
    display: flex; justify-content: center; align-items: flex-start;
    padding-top: 14vh;
    animation: fade-in 180ms ease;
  }
  @keyframes fade-in { from { opacity: 0 } to { opacity: 1 } }
  .cmd-viewport { width: min(620px, calc(100% - 2rem)); }
  .cmd-popup.live { animation: cmd-rise 220ms cubic-bezier(0.16, 1, 0.3, 1); }
  @keyframes cmd-rise {
    from { transform: translateY(8px) scale(0.98); opacity: 0; }
    to   { transform: translateY(0) scale(1); opacity: 1; }
  }

  /* ─────────────────────────────────────────────────────────── */
  /* Feature strip                                               */
  /* ─────────────────────────────────────────────────────────── */
  .features {
    display: grid; grid-template-columns: repeat(3, 1fr); gap: 14px;
    margin-top: 8px;
  }
  @media (max-width: 900px) { .features { grid-template-columns: 1fr; } }
  .feat-card {
    position: relative;
    padding: 22px 22px 18px;
    border-radius: 14px;
    background: linear-gradient(180deg, oklch(0.18 0.008 285 / 0.6), oklch(0.15 0.006 285 / 0.6));
    border: 1px solid oklch(1 0 0 / 0.06);
    display: flex; flex-direction: column; gap: 6px;
    transition: transform 200ms ease, border-color 200ms ease, background 200ms ease;
    overflow: hidden;
  }
  .feat-card::before {
    content: ""; position: absolute; inset: 0 0 auto 0; height: 2px;
    background: linear-gradient(90deg, transparent, var(--accent-color, oklch(0.75 0.15 25 / 0.5)), transparent);
    opacity: 0.6;
  }
  .feat-card.accent-coral { --accent-color: oklch(0.75 0.15 25 / 0.7); }
  .feat-card.accent-mint  { --accent-color: oklch(0.75 0.14 165 / 0.7); }
  .feat-card.accent-amber { --accent-color: oklch(0.78 0.13 80 / 0.7); }
  .feat-card:hover {
    transform: translateY(-3px);
    border-color: oklch(1 0 0 / 0.12);
    background: linear-gradient(180deg, oklch(0.2 0.008 285 / 0.8), oklch(0.16 0.006 285 / 0.8));
  }
  .feat-icon {
    width: 36px; height: 36px; border-radius: 9px;
    display: inline-flex; align-items: center; justify-content: center;
    margin-bottom: 10px;
    background: oklch(0.22 0.005 285 / 0.8);
    border: 1px solid oklch(1 0 0 / 0.06);
  }
  .accent-coral .feat-icon { color: oklch(0.8 0.14 25); background: oklch(0.3 0.08 25 / 0.3); border-color: oklch(0.75 0.15 25 / 0.2); }
  .accent-mint  .feat-icon { color: oklch(0.78 0.14 165); background: oklch(0.3 0.08 165 / 0.3); border-color: oklch(0.75 0.14 165 / 0.2); }
  .accent-amber .feat-icon { color: oklch(0.82 0.13 80); background: oklch(0.3 0.08 80 / 0.3); border-color: oklch(0.78 0.13 80 / 0.2); }
  .feat-icon svg { width: 18px; height: 18px; }
  .feat-title { font: 600 17px/1.3 "Inter"; letter-spacing: -0.015em; color: var(--foreground); }
  .feat-desc { font: 400 13.5px/1.55 "Inter"; color: var(--muted-foreground); margin: 4px 0 12px; }
  .feat-link {
    display: inline-flex; align-items: center; gap: 6px; margin-top: auto;
    font: 500 12.5px/1 "Inter"; color: var(--primary); cursor: pointer;
    transition: gap 160ms ease;
  }
  .feat-link:hover { gap: 10px; }
  .feat-link svg { width: 12px; height: 12px; }

  /* ─────────────────────────────────────────────────────────── */
  /* Operators section                                           */
  /* ─────────────────────────────────────────────────────────── */
  .operators { margin-top: 80px; }
  .section-head { margin-bottom: 22px; }
  .section-head-row { display: flex; justify-content: space-between; align-items: flex-end; gap: 16px; flex-wrap: wrap; }
  .section-title { font: 700 36px/1.1 "Inter"; letter-spacing: -0.025em; margin: 0; color: var(--foreground); }

  .op-filters { display: inline-flex; gap: 2px; padding: 3px; border-radius: 10px;
    background: oklch(0.18 0.008 285 / 0.6);
    border: 1px solid oklch(1 0 0 / 0.06);
  }
  .op-filters .op-chip {
    width: auto; height: 28px; padding: 0 12px; border-radius: 7px;
    font: 500 12px/1 "Inter"; color: var(--muted-foreground);
    background: transparent; box-shadow: none; cursor: pointer;
    border: none;
    transition: background-color 140ms ease, color 140ms ease;
  }
  .op-filters .op-chip:hover { color: var(--foreground); background: oklch(0.22 0.005 285 / 0.6); }
  .op-filters .op-chip.is-active {
    color: oklch(0.13 0.005 285);
    background: linear-gradient(180deg, oklch(0.78 0.14 25), oklch(0.72 0.15 25));
    box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.3), 0 2px 6px oklch(0.75 0.15 25 / 0.3);
  }

  /* ── Tier list preview grid ──────────────────────────────── */
  .section-lead {
    font: 400 14px/1.5 "Inter"; color: var(--muted-foreground);
    margin: 6px 0 0; max-width: 520px;
  }
  .tl-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 12px;
  }
  @media (max-width: 1000px) { .tl-grid { grid-template-columns: repeat(2, 1fr); } }
  @media (max-width: 640px)  { .tl-grid { grid-template-columns: 1fr; } }

  .tl-card {
    position: relative;
    display: flex; flex-direction: column;
    padding: 0;
    border-radius: 14px;
    background: linear-gradient(180deg, oklch(0.18 0.008 285 / 0.7), oklch(0.14 0.006 285 / 0.7));
    border: 1px solid oklch(1 0 0 / 0.06);
    box-shadow: 0 14px 32px oklch(0 0 0 / 0.35), inset 0 1px 0 oklch(1 0 0 / 0.04);
    overflow: hidden;
    transition: transform 180ms ease, border-color 180ms ease, box-shadow 180ms ease;
  }
  .tl-card:hover {
    transform: translateY(-2px);
    border-color: oklch(1 0 0 / 0.12);
    box-shadow: 0 20px 40px oklch(0 0 0 / 0.45), inset 0 1px 0 oklch(1 0 0 / 0.05);
  }
  /* Accent strip along the left edge */
  .tl-card::before {
    content: ""; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: linear-gradient(180deg, var(--tl-a, oklch(0.78 0.14 25)), var(--tl-b, oklch(0.55 0.16 25)));
    opacity: 0.9;
  }
  .tl-card.accent-coral  { --tl-a: oklch(0.78 0.14 25);  --tl-b: oklch(0.55 0.16 25);  }
  .tl-card.accent-mint   { --tl-a: oklch(0.78 0.14 160); --tl-b: oklch(0.5 0.14 160);  }
  .tl-card.accent-amber  { --tl-a: oklch(0.82 0.14 85);  --tl-b: oklch(0.58 0.14 75);  }
  .tl-card.accent-violet { --tl-a: oklch(0.72 0.16 290); --tl-b: oklch(0.5 0.18 290);  }

  /* Header */
  .tl-head { padding: 14px 16px 8px 18px; display: flex; flex-direction: column; gap: 6px; }
  .tl-tag {
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px 3px 8px; border-radius: 999px;
    background: oklch(0.22 0.005 285 / 0.6);
    border: 1px solid oklch(1 0 0 / 0.05);
    font: 500 10.5px/1 "Geist Mono", monospace;
    color: oklch(1 0 0 / 0.82); letter-spacing: 0.05em;
    text-transform: uppercase;
    width: max-content; max-width: 100%;
  }
  .tl-tag-dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: var(--tl-a, oklch(0.78 0.14 25));
    box-shadow: 0 0 6px var(--tl-a, oklch(0.78 0.14 25));
  }
  .tl-hot-inline { color: oklch(0.85 0.14 30); font-weight: 600; margin-left: 2px; text-transform: none; letter-spacing: 0.02em; }
  .tl-title {
    font: 600 16px/1.3 "Inter"; letter-spacing: -0.01em;
    color: var(--foreground); margin: 0;
    overflow: hidden; text-overflow: ellipsis; display: -webkit-box;
    -webkit-line-clamp: 2; -webkit-box-orient: vertical;
  }

  /* Preview block — S-tier teaser + ghost row */
  .tl-preview {
    padding: 2px 16px 12px 18px;
    display: flex; flex-direction: column; gap: 9px;
  }
  .tl-preview-head {
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }
  .tl-s-pill {
    display: inline-flex; align-items: center;
    padding: 3px 8px; border-radius: 5px;
    background: linear-gradient(180deg, var(--tl-a, oklch(0.85 0.16 25)), var(--tl-b, oklch(0.7 0.17 22)));
    color: oklch(0.13 0.005 285);
    font: 700 10.5px/1 "Inter"; letter-spacing: 0.02em;
  }
  .tl-s-count {
    font: 500 11px/1 "Geist Mono", monospace;
    color: var(--muted-foreground); letter-spacing: 0.03em;
  }
  .tl-s-row { display: flex; flex-wrap: wrap; gap: 5px; min-width: 0; }
  .tl-chip {
    all: unset;
    display: inline-flex; align-items: center; gap: 6px;
    padding: 3px 9px 3px 3px; border-radius: 999px; cursor: pointer;
    background: oklch(0.22 0.005 285 / 0.6);
    border: 1px solid oklch(1 0 0 / 0.05);
    font: 500 11.5px/1 "Inter"; color: oklch(1 0 0 / 0.9);
    transition: background-color 150ms ease, border-color 150ms ease, transform 150ms ease;
  }
  .tl-chip:hover {
    background: oklch(0.26 0.008 285 / 0.8);
    border-color: oklch(1 0 0 / 0.14);
    transform: translateY(-1px);
  }
  .tl-chip-initials {
    display: inline-flex; align-items: center; justify-content: center;
    width: 20px; height: 20px; border-radius: 999px;
    font: 700 9.5px/1 "Inter"; color: oklch(1 0 0 / 0.95);
    letter-spacing: -0.01em;
    box-shadow: inset 0 1px 0 oklch(1 0 0 / 0.2), inset 0 -1px 0 oklch(0 0 0 / 0.15);
  }
  .tl-chip.c-vanguard  .tl-chip-initials { background: linear-gradient(135deg, oklch(0.7 0.12 55),  oklch(0.55 0.14 45));  }
  .tl-chip.c-caster    .tl-chip-initials { background: linear-gradient(135deg, oklch(0.65 0.18 290),oklch(0.5 0.2 285));   }
  .tl-chip.c-medic     .tl-chip-initials { background: linear-gradient(135deg, oklch(0.72 0.14 180),oklch(0.58 0.14 175)); }
  .tl-chip.c-defender  .tl-chip-initials { background: linear-gradient(135deg, oklch(0.7 0.1 85),   oklch(0.58 0.12 75));  }
  .tl-chip.c-support   .tl-chip-initials { background: linear-gradient(135deg, oklch(0.68 0.14 330),oklch(0.55 0.16 320)); }
  .tl-chip.c-sniper    .tl-chip-initials { background: linear-gradient(135deg, oklch(0.72 0.14 155),oklch(0.55 0.14 150)); }
  .tl-chip.c-guard     .tl-chip-initials { background: linear-gradient(135deg, oklch(0.72 0.13 25), oklch(0.55 0.15 20));  }
  .tl-chip.c-special   .tl-chip-initials { background: linear-gradient(135deg, oklch(0.68 0.13 230),oklch(0.52 0.14 220)); }

  /* Ghost row — hint at A/B tiers without showing the whole list */
  .tl-ghost {
    display: flex; align-items: center; gap: 10px;
    padding-top: 2px;
  }
  .tl-ghost-label {
    font: 400 11px/1 "Geist Mono", monospace;
    color: oklch(1 0 0 / 0.42); letter-spacing: 0.03em;
  }
  .tl-ghost-stack { display: flex; align-items: center; }
  .tl-ghost-dot {
    width: 14px; height: 14px; border-radius: 999px;
    margin-left: -4px;
    border: 1.5px solid var(--card);
    opacity: 0.6;
    background: oklch(0.4 0.02 285);
  }
  .tl-ghost-dot:first-child { margin-left: 0; }
  .tl-ghost-dot.c-vanguard  { background: oklch(0.6 0.12 55); }
  .tl-ghost-dot.c-caster    { background: oklch(0.55 0.18 290); }
  .tl-ghost-dot.c-medic     { background: oklch(0.62 0.14 180); }
  .tl-ghost-dot.c-defender  { background: oklch(0.6 0.1 85); }
  .tl-ghost-dot.c-support   { background: oklch(0.58 0.14 330); }
  .tl-ghost-dot.c-sniper    { background: oklch(0.62 0.14 155); }
  .tl-ghost-dot.c-guard     { background: oklch(0.62 0.13 25); }
  .tl-ghost-dot.c-special   { background: oklch(0.58 0.13 230); }
  .tl-ghost-more {
    margin-left: 6px;
    font: 500 10.5px/1 "Geist Mono", monospace;
    color: oklch(1 0 0 / 0.55); letter-spacing: 0.02em;
  }

  /* Footer */
  .tl-foot {
    display: flex; justify-content: space-between; align-items: center;
    gap: 10px;
    padding: 10px 16px 12px 18px;
    border-top: 1px solid oklch(1 0 0 / 0.05);
    background: oklch(0.11 0.005 285 / 0.35);
  }
  .tl-foot-meta { display: flex; align-items: center; gap: 8px; min-width: 0; }
  .tl-avatar {
    display: inline-flex; align-items: center; justify-content: center;
    width: 22px; height: 22px; border-radius: 999px;
    background: linear-gradient(135deg, oklch(0.45 0.04 285), oklch(0.28 0.02 285));
    border: 1px solid oklch(1 0 0 / 0.08);
    font: 600 9.5px/1 "Inter"; color: oklch(1 0 0 / 0.9);
    letter-spacing: 0.02em; flex-shrink: 0;
  }
  .tl-foot-text {
    display: inline-flex; align-items: center; gap: 6px; min-width: 0;
    font: 400 11.5px/1 "Inter"; color: var(--muted-foreground);
    overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
  }
  .tl-author-name { color: var(--foreground); font-weight: 500; }
  .tl-foot-sep { opacity: 0.5; }
  .tl-foot-time { font-family: "Geist Mono", monospace; font-size: 11px; letter-spacing: 0.02em; }
  .tl-foot-cta { display: inline-flex; align-items: center; gap: 10px; flex-shrink: 0; }
  .tl-votes {
    display: inline-flex; align-items: center; gap: 4px;
    font: 500 11.5px/1 "Geist Mono", monospace;
    color: var(--muted-foreground); letter-spacing: 0.02em;
  }
  .tl-votes svg { width: 11px; height: 11px; opacity: 0.8; }
  .tl-cta {
    display: inline-flex; align-items: center; gap: 4px;
    font: 500 12px/1 "Inter"; color: var(--foreground);
    letter-spacing: -0.005em;
    transition: gap 150ms ease, color 150ms ease;
  }
  .tl-cta svg { width: 13px; height: 13px; transition: transform 200ms ease; }
  .tl-card:hover .tl-cta { color: oklch(0.82 0.16 30); }
  .tl-card:hover .tl-cta svg { transform: translateX(3px); }

  /* Browse-all footer link */
  .tl-browse {
    display: inline-flex; align-items: center; gap: 8px;
    margin-top: 18px;
    padding: 10px 14px; border-radius: 8px;
    border: 1px dashed oklch(1 0 0 / 0.12);
    background: transparent;
    font: 500 12.5px/1 "Inter"; color: var(--muted-foreground);
    letter-spacing: -0.005em; cursor: pointer;
    transition: border-color 200ms ease, color 200ms ease, background-color 200ms ease;
    width: max-content;
  }
  .tl-browse:hover {
    border-color: oklch(1 0 0 / 0.22);
    color: var(--foreground);
    background: oklch(1 0 0 / 0.02);
  }
  .tl-browse-dot {
    width: 6px; height: 6px; border-radius: 999px;
    background: oklch(0.78 0.14 25);
    box-shadow: 0 0 8px oklch(0.78 0.14 25 / 0.5);
  }
  .tl-browse svg { width: 12px; height: 12px; }

  .tl-footer-legacy-unused {
    display: flex; justify-content: space-between; align-items: center;
    gap: 12px; margin-top: 18px; padding: 14px 18px 14px 20px;
    border-radius: 12px;
    background: oklch(0.15 0.006 285 / 0.5);
    border: 1px dashed oklch(1 0 0 / 0.08);
    flex-wrap: wrap;
  }
  .tl-footer-text { display: flex; flex-direction: column; gap: 4px; }
  .tl-footer-count { font: 400 13px/1.3 "Inter"; color: var(--foreground); }

  /* (op-card & op-card-featured styles removed — legacy roster UI) */

  /* ─────────────────────────────────────────────────────────── */
  /* Drawer                                                       */
  /* ─────────────────────────────────────────────────────────── */
  .drawer-backdrop {
    position: fixed; inset: 0; z-index: 90;
    background: oklch(0.08 0.005 285 / 0.6);
    backdrop-filter: blur(4px);
    display: flex; justify-content: flex-end;
    animation: fade-in 180ms ease;
  }
  .drawer {
    width: min(460px, 92vw); height: 100vh;
    background: linear-gradient(180deg, oklch(0.18 0.008 285), oklch(0.15 0.006 285));
    border-left: 1px solid oklch(1 0 0 / 0.06);
    padding: 24px; display: flex; flex-direction: column; gap: 14px;
    animation: slide-in 260ms cubic-bezier(0.16, 1, 0.3, 1);
    overflow-y: auto;
  }
  @keyframes slide-in { from { transform: translateX(24px); opacity: 0; } to { transform: translateX(0); opacity: 1; } }
  .drawer-head { display: flex; justify-content: space-between; align-items: center; }
  .drawer-hero {
    height: 160px; border-radius: 12px; position: relative;
    display: flex; align-items: center; justify-content: center; overflow: hidden;
  }
  .drawer-initials {
    font: 700 54px/1 "Inter", system-ui, sans-serif;
    color: oklch(1 0 0 / 0.92); letter-spacing: -0.03em;
    text-shadow: 0 2px 6px oklch(0 0 0 / 0.35);
  }
  .drawer-rarity {
    position: absolute; top: 12px; left: 14px;
    font: 500 11px/1 "Geist Mono", monospace;
    color: oklch(1 0 0 / 0.85); letter-spacing: 0.06em;
  }
  .drawer-title {
    font: 700 28px/1.1 "Inter"; letter-spacing: -0.02em;
    margin: 4px 0 0; color: var(--foreground);
  }
  .drawer-tags { display: flex; gap: 6px; flex-wrap: wrap; }
  .stat-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 8px; margin-top: 6px; }
  .stat-grid > div {
    border-radius: 8px; padding: 10px;
    background: oklch(0.22 0.005 285 / 0.5);
    border: 1px solid oklch(1 0 0 / 0.04);
  }
  .stat-label {
    font: 500 10px/1 "Geist Mono", monospace;
    text-transform: uppercase; color: var(--muted-foreground);
    letter-spacing: 0.08em;
  }
  .stat-val { font: 600 17px/1.1 "Inter"; letter-spacing: -0.01em; margin-top: 5px; color: var(--foreground); }
  .drawer-actions { display: flex; gap: 8px; margin-top: 6px; }

  /* ─────────────────────────────────────────────────────────── */
  /* Footer                                                       */
  /* ─────────────────────────────────────────────────────────── */
  .site-footer {
    border-top: 1px solid oklch(1 0 0 / 0.05);
    margin-top: 96px; padding: 22px 0;
    background: oklch(0.13 0.005 285 / 0.6);
  }
  .footer-inner {
    display: flex; justify-content: space-between; align-items: center;
    gap: 14px; flex-wrap: wrap;
  }
  .footer-brand {
    display: inline-flex; align-items: center; gap: 8px;
    font: 500 12.5px/1 "Inter"; color: var(--foreground);
  }
  .footer-brand .muted { color: var(--muted-foreground); }
  .footer-note { font: 400 11.5px/1.5 "Inter"; color: var(--muted-foreground); max-width: 40ch; text-align: center; }
  .footer-meta { font: 500 11px/1 "Geist Mono", monospace; color: var(--muted-foreground); letter-spacing: 0.04em; }

  /* ─────────────────────────────────────────────────────────── */
  /* Background decor: subtle radar + scanline                   */
  /*                                                             */
  /* ─────────────────────────────────────────────────────────── */
  .bg-decor {
    position: fixed; inset: 0; pointer-events: none; z-index: 0;
    overflow: hidden;
  }
  .bg-decor svg {
    position: absolute; display: block;
    color: oklch(0.75 0.15 25);
  }
  /* Radar: bottom-right, faded */
  .bg-radar {
    width: 640px; height: 640px;
    right: -220px; bottom: -220px;
    opacity: 0.22;
  }
  .bg-radar .ring { stroke: currentColor; fill: none; stroke-width: 0.5; opacity: 0.55; }
  .bg-radar .ring-dash { stroke-dasharray: 2 8; opacity: 0.35; }
  .bg-radar .axis { stroke: currentColor; stroke-width: 0.4; opacity: 0.18; stroke-dasharray: 1 4; }
  .bg-radar .sweep { transform-origin: 280px 280px; animation: radar-sweep 14s linear infinite; }
  @keyframes radar-sweep { to { transform: rotate(360deg); } }
  .bg-radar .blip { fill: oklch(0.85 0.13 25); animation: blip 7s ease-in-out infinite; }
  .bg-radar .blip:nth-of-type(2) { animation-delay: 2.4s; }
  @keyframes blip {
    0%, 80%, 100% { opacity: 0; r: 1.5; }
    12%           { opacity: 0.9; r: 2.4; }
    40%           { opacity: 0.3; r: 3.6; }
  }

  @media (prefers-reduced-motion: reduce) {
    .bg-radar .sweep, .bg-radar .blip { animation: none; }
  }

  /* Rise-in on mount */
  .rise-in { animation: rise-in 700ms cubic-bezier(0.16, 1, 0.3, 1) both; }
  .rise-in:nth-child(2) { animation-delay: 80ms; }
  .rise-in:nth-child(3) { animation-delay: 160ms; }

  /* ─────────────────────────────────────────────────────────── */
  /* Tweaks panel (edit-mode only)                                */
  /* ─────────────────────────────────────────────────────────── */
  .tweaks-panel {
    position: fixed; right: 20px; bottom: 20px; z-index: 200;
    background: oklch(0.13 0.005 285 / 0.95);
    backdrop-filter: blur(16px) saturate(150%);
    border: 1px solid oklch(1 0 0 / 0.08);
    border-radius: 14px;
    padding: 14px 16px 16px;
    box-shadow: 0 20px 60px oklch(0 0 0 / 0.5);
    width: min(340px, calc(100vw - 40px));
    animation: rise-in 300ms cubic-bezier(0.16, 1, 0.3, 1) both;
  }
  .tweaks-head {
    font: 500 10.5px/1 "Geist Mono", monospace;
    letter-spacing: 0.12em; text-transform: uppercase;
    color: var(--muted-foreground);
    padding-bottom: 10px; margin-bottom: 10px;
    border-bottom: 1px solid oklch(1 0 0 / 0.06);
  }
  .tweaks-row { display: flex; flex-direction: column; gap: 8px; }
  .tweaks-label {
    font: 500 12px/1 "Inter"; color: var(--foreground);
    letter-spacing: -0.005em;
  }
  .tweaks-options { display: grid; grid-template-columns: 1fr; gap: 6px; }
  .tweaks-opt {
    all: unset; display: flex; align-items: center; gap: 10px; cursor: pointer;
    padding: 6px 8px 6px 6px; border-radius: 8px;
    border: 1px solid oklch(1 0 0 / 0.04);
    background: oklch(0.17 0.005 285 / 0.5);
    transition: background-color 150ms ease, border-color 150ms ease;
  }
  .tweaks-opt:hover { background: oklch(0.22 0.008 285 / 0.7); border-color: oklch(1 0 0 / 0.1); }
  .tweaks-opt.is-active {
    border-color: oklch(0.75 0.15 25 / 0.55);
    background: oklch(0.3 0.08 25 / 0.18);
  }
  .tweaks-opt-swatch {
    width: 42px; height: 26px; border-radius: 5px; overflow: hidden;
    flex-shrink: 0;
    border: 1px solid oklch(1 0 0 / 0.08);
  }
  .tweaks-opt-swatch img {
    width: 100%; height: 100%; object-fit: cover; display: block;
  }
  .tweaks-opt-label { font: 500 12.5px/1 "Inter"; color: var(--foreground); letter-spacing: -0.005em; }
  @keyframes rise-in { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: translateY(0); } }
</style>
</head>
<body>
  <div id="app"></div>

  <script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
  <script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>

  <script type="text/babel" src="Primitives.jsx"></script>
  <script type="text/babel" src="Header.jsx"></script>
  <script type="text/babel" src="Hero.jsx"></script>
  <script type="text/babel" src="Sections.jsx"></script>
  <script type="text/babel" src="CommandDialog.jsx"></script>

  <script type="text/babel">
    const { useState, useEffect } = React;
    const { Header, Hero, FeatureStrip, TierLists, OperatorDrawer, CommandDialog, Footer } = window;

    // ── Background decor: radar sweep + scanline only ────────────
    // Two distinct motifs rendered as SVG + CSS animations:
    //  1) Wireframe icosahedron (pre-computed 2D projection of the 12 vertices
    //     of a regular icosahedron, with 30 visible edges).
    //  2) Radar sweep with concentric rings, animated blips, cross-hair axes.
    // A thin horizontal scanline sweeps the whole viewport in the background.
    function BgDecor() {
      return (
        <React.Fragment>
          <div className="bg-decor" aria-hidden="true">
            {/* Radar rings + slow sweep, bottom-right */}
            <svg className="bg-radar" viewBox="0 0 560 560">
              <defs>
                <linearGradient id="sweep-grad" x1="0" x2="1" y1="0" y2="0">
                  <stop offset="0%"  stopColor="oklch(0.75 0.15 25)" stopOpacity="0"/>
                  <stop offset="100%" stopColor="oklch(0.75 0.15 25)" stopOpacity="0.45"/>
                </linearGradient>
                <radialGradient id="radar-fade" cx="0.5" cy="0.5" r="0.5">
                  <stop offset="0%"  stopColor="black" stopOpacity="1"/>
                  <stop offset="100%" stopColor="black" stopOpacity="0"/>
                </radialGradient>
                <mask id="radar-mask">
                  <rect x="0" y="0" width="560" height="560" fill="url(#radar-fade)"/>
                </mask>
              </defs>
              <g mask="url(#radar-mask)">
                {[80, 150, 220].map((r, i) => (
                  <circle key={i} className={`ring ${i === 1 ? "ring-dash" : ""}`} cx="280" cy="280" r={r}/>
                ))}
                <line className="axis" x1="40"  y1="280" x2="520" y2="280"/>
                <line className="axis" x1="280" y1="40"  x2="280" y2="520"/>
                <g className="sweep">
                  <path d="M280 280 L280 60 A220 220 0 0 1 440 140 Z" fill="url(#sweep-grad)"/>
                </g>
                <circle className="blip" cx="360" cy="200" r="2"/>
                <circle className="blip" cx="210" cy="330" r="2"/>
              </g>
            </svg>
          </div>
        </React.Fragment>
      );
    }

    function App() {
      const [active, setActive] = useState("/");
      const [selected, setSelected] = useState(null);
      const [cmdOpen, setCmdOpen] = useState(false);

      // Tweakable defaults (persisted via edit-mode protocol)
      const TWEAK_DEFAULTS = /*EDITMODE-BEGIN*/{
        "heroCg": "skadi"
      }/*EDITMODE-END*/;
      const [tweaks, setTweaks] = useState(TWEAK_DEFAULTS);
      const [editMode, setEditMode] = useState(false);

      useEffect(() => {
        const onKey = (e) => {
          if ((e.metaKey || e.ctrlKey) && e.key.toLowerCase() === "k") {
            e.preventDefault();
            setCmdOpen(o => !o);
          }
        };
        window.addEventListener("keydown", onKey);
        return () => window.removeEventListener("keydown", onKey);
      }, []);

      // Edit-mode protocol: listen first, THEN announce availability.
      useEffect(() => {
        const onMsg = (e) => {
          const d = e.data;
          if (!d || typeof d !== "object") return;
          if (d.type === "__activate_edit_mode")   setEditMode(true);
          if (d.type === "__deactivate_edit_mode") setEditMode(false);
        };
        window.addEventListener("message", onMsg);
        window.parent.postMessage({ type: "__edit_mode_available" }, "*");
        return () => window.removeEventListener("message", onMsg);
      }, []);

      const setTweak = (key, value) => {
        setTweaks(prev => ({ ...prev, [key]: value }));
        window.parent.postMessage({ type: "__edit_mode_set_keys", edits: { [key]: value } }, "*");
      };

      return (
        <div className="app" data-screen-label="01 myrtle.moe v3">
          <BgDecor />
          <Header active={active} onNav={setActive} onOpenCommand={() => setCmdOpen(true)} />
          <main>
            <div className="rise-in">
              <Hero
                onOpenCommand={() => setCmdOpen(true)}
                onExplore={() => setActive("/operators")}
                heroCg={tweaks.heroCg}
              />
            </div>
            <div className="page-wrap rise-in"><FeatureStrip /></div>
            <div className="rise-in"><TierLists onSelect={setSelected} /></div>
          </main>
          <Footer />
          <OperatorDrawer op={selected} onClose={() => setSelected(null)} />
          <CommandDialog open={cmdOpen} onClose={() => setCmdOpen(false)} />
          {editMode && <TweaksPanel tweaks={tweaks} setTweak={setTweak} />}
        </div>
      );
    }

    function TweaksPanel({ tweaks, setTweak }) {
      const cgs = [
        { id: "skadi",  label: "Skadi · Stultifera" },
        { id: "wcrits", label: "W × Crits · Hortus" },
        { id: "gavial", label: "Gavial · Guiding Ahead" },
      ];
      return (
        <div className="tweaks-panel" role="dialog" aria-label="Tweaks">
          <div className="tweaks-head">Tweaks</div>
          <div className="tweaks-row">
            <label className="tweaks-label">Hero backdrop</label>
            <div className="tweaks-options">
              {cgs.map(c => (
                <button
                  key={c.id}
                  className={"tweaks-opt" + (tweaks.heroCg === c.id ? " is-active" : "")}
                  onClick={() => setTweak("heroCg", c.id)}
                >
                  <span className="tweaks-opt-swatch">
                    <img src={`art/cg-${c.id}.png`} alt="" />
                  </span>
                  <span className="tweaks-opt-label">{c.label}</span>
                </button>
              ))}
            </div>
          </div>
        </div>
      );
    }

    ReactDOM.createRoot(document.getElementById("app")).render(<App />);
  </script>
</body>
</html>
