services:
  postgres:
    image: postgres:18-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - myrtle_pgdata:/var/lib/postgresql
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U myrtle -d myrtle"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myrtle
    profiles:
      - "${ENABLE_DB:-true}"

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --save 60 1 --loglevel warning
    volumes:
      - myrtle_redisdata:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - myrtle
    profiles:
      - "${ENABLE_CACHE:-true}"

  backend:
    build:
      context: ./backend
      platforms:
        - linux/amd64
      dockerfile: ${DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    depends_on:
      postgres:
        condition: service_healthy
        required: false
      redis:
        condition: service_healthy
        required: false
    environment:
      DATABASE_URL: ${DATABASE_URL}
      REDIS_URL: ${REDIS_URL}
      # Base output dir; per-server data loads from {ASSETS_DIR}/{server}.
      ASSETS_DIR: ${ASSETS_DIR}
      SERVERS: ${SERVERS:-en}
      JWT_SECRET: ${JWT_SECRET}
      SERVICE_KEY: ${SERVICE_KEY}
      # Per-server hot-reload WebSockets (see .env.example).
      ASSET_WS_URLS: ${ASSET_WS_URLS}
      RATE_LIMIT_RPM: ${RATE_LIMIT_RPM:-100}
      DPS_POLL_INTERVAL: ${DPS_POLL_INTERVAL:-1800}
      DPS_AUTO_RESTART: ${DPS_AUTO_RESTART:-true}
      GITHUB_TOKEN: ${GITHUB_TOKEN}
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./backend:/src
      - ./assets/output:/data/output:ro
    ports:
      - "3060:3060"
    networks:
      - myrtle
    profiles:
      - "true"

  frontend:
    build:
      context: ./frontend
      platforms:
        - linux/amd64
      dockerfile: ${DOCKERFILE:-Dockerfile}
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      BACKEND_URL: ${BACKEND_URL}
      INTERNAL_SERVICE_KEY: ${SERVICE_KEY}
    volumes:
      - ./frontend:/src
    ports:
      - "3000:3000"
    networks:
      - myrtle
    profiles:
      - "true"

  discord:
    build:
      context: ./discord
      platforms:
        - linux/amd64
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      DISCORD_TOKEN: ${DISCORD_TOKEN}
      DATABASE_URL: ${DISCORD_DATABASE_URL:-sqlite:/data/discord.sqlite}
      DISCORD_CONFIG_PATH: /app/config.json
      RUST_LOG: ${RUST_LOG:-info}
    volumes:
      - ./discord/config.json:/app/config.json:ro
      - myrtle_discorddata:/data
    networks:
      - myrtle
    profiles:
      - discord

  dps-tools:
    build:
      context: ./backend
      platforms:
        - linux/amd64
      dockerfile: Dockerfile.dev
    profiles:
      - tools
    volumes:
      - ./backend:/src
      - ./assets/output:/data/output:ro
      - cargo_cache:/usr/local/cargo/registry
      - pip_cache:/root/.cache/pip
    environment:
      # DPS codegen reads a single server's gamedata (the EN reference).
      GAME_DATA_DIR: ${GAME_DATA_DIR}
      ASSETS_DIR: /data/output/en
      CARGO_TARGET_DIR: /tmp/cargo_target
    command: sh ./scripts/run-dps-tools.sh

  # Asset pipeline (downloader + unpacker). Region-aware: it nests under
  # /data/ArkAssets/{server} and /data/output/{server}. For multi-region
  # hot-reload, run one watcher per server on distinct ports and point the
  # backend's ASSET_WS_URLS at them, e.g.:
  #   node run.mjs ws --server en             --output /data/output --port 9160
  #   node run.mjs ws --server cn --profile operators --output /data/output --port 9161
  asset-tools:
    build:
      context: ./assets
      platforms:
        - linux/amd64
    profiles:
      - tools
    volumes:
      - ./assets:/src
      - ./assets/ArkAssets:/data/ArkAssets
      - ./assets/output:/data/output
      - cargo_cache:/usr/local/cargo/registry

  # Live per-server asset pipelines: poll AK, download/unpack into the shared
  # /data volumes, and broadcast over WS so the backend hot-reloads and the
  # discord bot announces. Heavy (CDN access + ~20 GB/region); enable with the
  # `assets` profile, then point ASSET_WS_URLS at these services by name.
  asset-ws-en:
    build:
      context: ./assets
      platforms:
        - linux/amd64
    restart: unless-stopped
    working_dir: /build
    command: ["node", "run.mjs", "ws", "--server", "en", "--port", "9160", "--savedir", "/data/ArkAssets", "--output", "/data/output"]
    volumes:
      - ./assets/ArkAssets:/data/ArkAssets
      - ./assets/output:/data/output
    networks:
      - myrtle
    profiles:
      - assets

  asset-ws-cn:
    build:
      context: ./assets
      platforms:
        - linux/amd64
    restart: unless-stopped
    working_dir: /build
    command: ["node", "run.mjs", "ws", "--server", "cn", "--profile", "operators", "--port", "9161", "--savedir", "/data/ArkAssets", "--output", "/data/output"]
    volumes:
      - ./assets/ArkAssets:/data/ArkAssets
      - ./assets/output:/data/output
    networks:
      - myrtle
    profiles:
      - assets

volumes:
  myrtle_pgdata:
  myrtle_redisdata:
  myrtle_discorddata:
  cargo_cache:
  pip_cache:

networks:
  myrtle:
    driver: bridge
